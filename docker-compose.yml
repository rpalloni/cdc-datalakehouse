services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=bookings
    command: [ "postgres", "-c", "wal_level=logical" ] 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      booking-network:

  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_KRAFT_MODE: 'true'
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN

    healthcheck:
      test: sh -c "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      booking-network:

  kafka-connect:
    build: .
    container_name: kafka-connect
    image: kafka-connect
    ports:
      - 8083:8083
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_PLUGIN_PATH: "/opt/kafka/plugins,/opt/kafka/custom-plugins"
    volumes:
      - ./custom-plugins:/opt/kafka/custom-plugins 
    networks:
      booking-network:

  # Minio Storage Server
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=storage
      - MINIO_REGION=eu-central-1
      - MINIO_REGION_NAME=eu-central-1
    command: ['server', '/data', '--console-address', ':9001', '--address', ':9000']
    # entrypoint: >
    #   /bin/sh -c "
    #   /usr/bin/minio server /data --console-address :9001 --address :9000 & sleep 5;
    #   /usr/bin/mc alias set storage http://localhost:9000 admin password;
    #   /usr/bin/mc mb storage/warehouse;
    #   wait
    #   "
    volumes:
      - minio_data:/data
    networks:
      booking-network:

  # Nessie Catalog Server (using RocksDB for persistence)
  nessie:
    image: projectnessie/nessie:0.76.6
    container_name: nessie
    ports:
      - 19120:19120
    environment:
      - NESSIE_CATALOG_SERVICE_S3_REGION=eu-central-1
      - NESSIE_CATALOG_SERVICE_S3_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_SERVICE_S3_PATH_STYLE_ACCESS=true # path style access enabled: minio:9000/bucket (S3 default to virtual host style: bucket.minio:9000)
      # - NESSIE_VERSION_STORE_TYPE=ROCKSDB # Persist catalog metadata in RocksDB (file-based) instead of default in-memory storage
      # - NESSIE_VERSION_STORE_PERSIST_ROCKS_DATABASE_PATH=/nessie/data/rocksdb
    volumes:
      - nessie_data:/nessie/data  
    networks:
      booking-network:

  # Dremio Query Engine Server
  dremio:
    image: dremio/dremio-oss:26.0.0
    container_name: dremio
    ports:
      - 9047:9047
      - 31010:31010
      - 32010:32010
    environment:
      - DREMIO_JAVA_SERVER_EXTRA_OPTS=-Dpaths.dist=file:///opt/dremio/data/dist # Dremio engine (-D) data stored in local FS
      - DREMIO_JAVA_EXTRA_OPTS=-Dfs.s3a.path.style.access=true -Ddremio.s3.region=eu-central-1 # path style and region settings
    volumes:
      - dremio_data:/opt/dremio/data 
    networks:
      booking-network:

networks:
  booking-network:
     
volumes:
  postgres_data:
  minio_data:
  nessie_data:
  dremio_data: